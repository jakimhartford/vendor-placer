services:
  - type: web
    name: vendor-placer-api
    runtime: node
    buildCommand: npm install
    startCommand: node server/src/index.js
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: vendor-placer-client
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
